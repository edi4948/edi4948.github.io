  <!-- Compass left arm -->
  <line x1="16" y1="4" x2="5"  y2="28" stroke="#c8a96e" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Compass right arm -->
  <line x1="16" y1="4" x2="27" y2="28" stroke="#c8a96e" stroke-width="2.2" stroke-linecap="round"/>
